[workspace]
name = "Cascade Effects"
root = "/Users/mike/CascadeEffects"
artifact_root = ".artifacts"
schema_version = 1
production_runtime_target = "season_2_plus_compact_longform"

[commands]
ce = "bin/ce"
doctor = "bin/ce doctor"
status = "bin/ce status"
review_server = "bin/ce review-server"
review_list = "bin/ce review-list"

[paths]
agent_skills = "ops/agents/skills"
audio_tools = "packages/media-pipeline/audio"
viz_tools = "packages/media-pipeline/viz"
review_app = "apps/review"
web = "apps/web"
season_02 = "episodes/season-02"
season_01_reference = "archive/season-01-reference"
tasks = "ops/tasks"
locks = "ops/locks"
contracts = "packages/contracts"
production_registry = "packages/production-registry"
production_tools = "packages/production-tools"
media_pipeline = "packages/media-pipeline"

[deploy.web]
provider = "vercel"
root_directory = "apps/web"
framework = "nextjs"
build_command = "npm run build"
lint_command = "npm run lint"

[artifacts]
git_policy = "manifests_and_checksums_only"
local_store = ".artifacts"
allowed_tracked_media = ["apps/web/public/**", "apps/web/app/icon.png"]

[season_defaults.season_2_plus]
runtime_target_minutes = "12-18"
runtime_exception = "up to about 20 minutes when evidence genuinely requires it"
expanded_episode_requires_human_approval = true
paper_architecture_video_assets_allowed = false
manual_public_release_only = true

[[seasons]]
id = "season-01"
path = "archive/season-01-reference"
status = "reference_only"
source = "compact audit manifests, receipts, and summary; old roots stay external migration sources"

[[seasons]]
id = "season-02"
path = "episodes/season-02"
status = "active"
source = "canonical table rows 9-16 reconstructed starter backlog"
